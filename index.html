<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Per la Mamma Più Speciale 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow-x: hidden;
    text-align: center;
    color: #fff;
}

/* Animazione titolo */
h1 {
    margin-top: 80px;
    font-size: 3em;
    opacity: 0;
    animation: fadeIn 3s forwards;
}

p {
    font-size: 1.3em;
    width: 80%;
    margin: 20px auto;
    opacity: 0;
    animation: fadeIn 4s forwards;
    animation-delay: 1s;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* Cuori animati */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 24px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Bottone */
button {
    background-color: #fff;
    color: #e91e63;
    border: none;
    padding: 15px 30px;
    font-size: 1.1em;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 30px;
}

button:hover {
    background-color: #e91e63;
    color: #fff;
    transform: scale(1.1);
}

/* Immagine */
img {
    max-width: 400px;
    width: 90%;
    margin: 30px auto;
    border-radius: 20px;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    opacity: 0;
    animation: fadeIn 3.5s forwards;
    animation-delay: 0.5s;
}
</style>
</head>

<body>

<h1>🌸 Per la Donna Più Importante della Mia Vita 🌸</h1>

<img src="https://m.media-amazon.com/images/I/51DwuXMhkYL._AC_UF1000,1000_QL80_.jpg" alt="Immagine speciale">

<p>
Cara Mamma, questo piccolo spazio è dedicato a te.  
Alla tua forza, al tuo amore infinito, al tuo sorriso che illumina le mie giornate.
</p>

<button onclick="playMusic()">💖 Premi Qui Mamma 💖</button>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    document.getElementById("bgMusic").play();
    document.getElementById("clickSound").play();
    alert("Ti voglio bene Mamma ❤️");
}

/* Generazione cuori casuali */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
